// ============ SHARED COMPONENTS ============

function GoldBtn({ children, href, onClick, outline, small }) {
  const [hov, setHov] = useState(false);
  const s = {
    display: 'inline-flex', alignItems: 'center', gap: 8,
    padding: small ? '10px 22px' : '15px 32px',
    borderRadius: 6,
    fontFamily: fonts.sans, fontSize: small ? 13 : 15, fontWeight: 700,
    cursor: 'pointer', textDecoration: 'none', letterSpacing: '0.02em',
    transition: 'all 0.15s ease',
    border: outline ? `2px solid ${C.gold}` : 'none',
    background: outline ? (hov ? C.gold : 'transparent') : (hov ? C.goldLight : C.gold),
    color: outline ? (hov ? C.black : C.gold) : C.black,
    boxShadow: hov && !outline ? `0 4px 20px rgba(201,162,39,0.35)` : 'none',
  };
  const p = { style: s, onMouseEnter: () => setHov(true), onMouseLeave: () => setHov(false), onClick };
  if (href) return <a href={href} {...p}>{children}</a>;
  return <button {...p}>{children}</button>;
}

// Split Call / Text button
function PhoneTextBtn({ small }) {

    letterSpacing: '0.02em', cursor: 'pointer',
    textDecoration: 'none', transition: 'all 0.15s ease',
    fontSize: small ? 13 : 15,
    padding: small ? '10px 18px' : '15px 28px',
    border: 'none',
  };
  return (
    <div style={{ display: 'inline-flex', borderRadius: 6, overflow: 'hidden', boxShadow: '0 4px 20px rgba(201,162,39,0.2)' }}>
      <a href={`tel:${BIZ.phonePlain}`} style={{
        ...base,
        background: hovCall ? C.goldLight : C.gold,
        color: C.black,
        borderRight: `1px solid rgba(0,0,0,0.2)`,
      }}
      onMouseEnter={() => setHovCall(true)}
      onMouseLeave={() => setHovCall(false)}
      >
        Call {BIZ.phone}
      </a>
      <a href={`sms:${BIZ.phonePlain}`} style={{
        ...base,
        background: hovText ? C.goldDark : 'rgba(201,162,39,0.15)',
        color: hovText ? C.black : C.gold,
        border: `1px solid ${C.goldBorder}`,
        borderLeft: 'none',
      }}
      onMouseEnter={() => setHovText(true)}
      onMouseLeave={() => setHovText(false)}
      >
        Send a Text

    </div>
  );
}

// ============ NAVBAR ============

function Navbar() {
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
      background: scrolled ? 'rgba(13,13,13,0.96)' : 'transparent',
      borderBottom: scrolled ? `1px solid ${C.borderDark}` : 'none',
      backdropFilter: scrolled ? 'blur(16px)' : 'none',
      transition: 'all 0.3s ease',
    }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto', padding: '0 28px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 70,
      }}>
        {/* Logo mark */}
        <a href="#" style={{ textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 12 }}>
          <img
            src="logo.jpg"
            alt="John Hill Handyman"
            style={{ width: 44, height: 44, borderRadius: 8, objectFit: 'cover', boxShadow: `0 2px 12px rgba(201,162,39,0.25)` }}
          />
          <div>
            <div style={{ fontFamily: fonts.sans, fontSize: 16, fontWeight: 800, color: C.white, letterSpacing: '-0.02em', lineHeight: 1 }}>John Hill</div>
            <div style={{ fontFamily: fonts.sans, fontSize: 9, fontWeight: 700, color: C.gold, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Handyman Service</div>
          </div>
        </a>

        {/* Nav links + CTA */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
          {['Services', 'How It Works', 'Reviews', 'Contact'].map(l => (
            <a key={l} href={`#${l.toLowerCase().replace(/ /g, '-')}`} style={{
              fontFamily: fonts.sans, fontSize: 14, fontWeight: 500,
              color: C.textMuted, textDecoration: 'none', transition: 'color 0.15s',
            }}
            onMouseEnter={e => e.target.style.color = C.gold}
            onMouseLeave={e => e.target.style.color = C.textMuted}
            >
              {l}
            </a>
          ))}
          <PhoneTextBtn small />
        </div>
      </div>
    </nav>
  );
}

function ServiceTicker() {

  return (
    <div style={{ background: C.gold, padding: '14px 0', overflow: 'hidden' }}>
      <div style={{ display: 'flex', animation: 'ticker 22s linear infinite', width: 'max-content' }}>
        {repeated.map((item, i) => (
          <span key={i} style={{
            fontFamily: fonts.sans, fontSize: 12, fontWeight: 800, color: C.black,

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32 }}>
          {HOW_IT_WORKS.map((step, i) => (
            <div key={i} style={{
              background: C.charcoalMid, border: `1px solid ${C.borderDark}`,
              borderRadius: 16, padding: '44px 36px', textAlign: 'center', position: 'relative',
            }}>
              {/* Step number */}
              <div style={{
                width: 60, height: 60,
                background: `linear-gradient(135deg, ${C.goldDark}, ${C.gold})`,
                borderRadius: '50%',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto 28px',
                fontFamily: fonts.sans, fontSize: 20, fontWeight: 900, color: C.black,
                boxShadow: `0 4px 20px rgba(201,162,39,0.3)`,
              }}>
                {step.step}
              </div>
              <h3 style={{
                fontFamily: fonts.sans, fontSize: 20, fontWeight: 700,
                color: C.white, marginBottom: 14,
              }}>
                {step.title}
              </h3>
              <p style={{ fontFamily: fonts.sans, fontSize: 15, color: C.textMuted, lineHeight: 1.7 }}>
                {step.desc}
              </p>
              {/* Arrow connector */}
              {i < HOW_IT_WORKS.length - 1 && (
                <div style={{
                  position: 'absolute', right: -20, top: '50%', transform: 'translateY(-50%)',
                  color: C.gold, fontSize: 22, fontWeight: 700, zIndex: 2,
                }}>→</div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ============ CONTACT FORM ============

function Contact() {
  const [form, setForm] = useState({ name: '', email: '', phone: '', service: '', message: '' });
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = (e) => {
    e.preventDefault();
    const body = [
      `Name: ${form.name}`,
      `Email: ${form.email}`,
      `Phone: ${form.phone}`,
      `Service Needed: ${form.service}`,
      `Message: ${form.message}`,
    ].join('\n');
    window.location.href = `mailto:${BIZ.email}?subject=Service Request from ${encodeURIComponent(form.name)}&body=${encodeURIComponent(body)}`;
    setSubmitted(true);
  };

  const inputStyle = {
    width: '100%',
    background: '#F2EDE4',
    border: '1.5px solid #DDD0B8',
    borderRadius: 8,
    padding: '14px 16px',
    fontFamily: fonts.sans,
    fontSize: 15,
    color: C.textDark,
    outline: 'none',
    transition: 'border-color 0.15s',
  };

  const labelStyle = {
    fontFamily: fonts.sans,
    fontSize: 13,
    fontWeight: 600,
    color: '#5A4E3E',
    marginBottom: 8,
    display: 'block',
    letterSpacing: '0.02em',
  };

  return (
    <section id="contact" style={{ background: C.charcoalMid, padding: '100px 28px' }}>
      {/* Header */}
      <div style={{ textAlign: 'center', marginBottom: 56 }}>
        <h2 style={{
          fontFamily: fonts.sans, fontSize: 'clamp(36px, 4.5vw, 60px)',
          fontWeight: 900, color: C.white, letterSpacing: '-0.04em', marginBottom: 16,
        }}>
          Contact Us
        </h2>
        <p style={{
          fontFamily: fonts.sans, fontSize: 17, color: C.textMuted,
          maxWidth: 480, margin: '0 auto', lineHeight: 1.7,
        }}>
          Have a question or need a quote? Fill out the form below or reach out directly — we're here to help.
        </p>
      </div>

      {/* Form card */}
      <div style={{
        maxWidth: 760, margin: '0 auto',
        background: C.cream,
        borderRadius: 20,
        padding: '52px 52px',
        boxShadow: '0 20px 60px rgba(0,0,0,0.35)',
      }}>
        {submitted ? (
          <div style={{ textAlign: 'center', padding: '40px 0' }}>
            <div style={{
              width: 60, height: 60, margin: '0 auto 20px',
              background: `linear-gradient(135deg, ${C.goldDark}, ${C.gold})`,
              borderRadius: '50%',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
                <path d="M2 10L9 17L22 2" stroke="#0D0D0D" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <h3 style={{ fontFamily: fonts.sans, fontSize: 24, fontWeight: 800, color: C.textDark, marginBottom: 10 }}>
              Message Sent!
            </h3>
            <p style={{ fontFamily: fonts.sans, fontSize: 16, color: C.textMid, lineHeight: 1.6 }}>
              Your email client should have opened with your message. John will be in touch shortly.
            </p>
          </div>
        ) : (
          <form onSubmit={handleSubmit}>
            {/* Full Name */}
            <div style={{ marginBottom: 24 }}>
              <label style={labelStyle}>Full Name</label>
              <input
                type="text"
                placeholder="Jane Smith"
                required
                value={form.name}
                onChange={e => set('name', e.target.value)}
                style={inputStyle}
                onFocus={e => e.target.style.borderColor = C.goldDark}
                onBlur={e => e.target.style.borderColor = '#DDD0B8'}
              />
            </div>

            {/* Email + Phone row */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 24 }}>
              <div>
                <label style={labelStyle}>Email Address</label>
                <input
                  type="email"
                  placeholder="you@example.com"
                  required
                  value={form.email}
                  onChange={e => set('email', e.target.value)}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = C.goldDark}
                  onBlur={e => e.target.style.borderColor = '#DDD0B8'}
                />
              </div>
              <div>
                <label style={labelStyle}>Phone</label>
                <input
                  type="tel"
                  placeholder="+1 (207) 000-0000"
                  value={form.phone}
                  onChange={e => set('phone', e.target.value)}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = C.goldDark}
                  onBlur={e => e.target.style.borderColor = '#DDD0B8'}
                />
              </div>
            </div>

            {/* Service dropdown */}
            <div style={{ marginBottom: 24 }}>
              <label style={labelStyle}>Required Service</label>
              <div style={{ position: 'relative' }}>
                <select
                  value={form.service}
                  onChange={e => set('service', e.target.value)}
                  style={{
                    ...inputStyle,
                    appearance: 'none',
                    WebkitAppearance: 'none',
                    cursor: 'pointer',
                    paddingRight: 44,
                  }}
                  onFocus={e => e.target.style.borderColor = C.goldDark}
                  onBlur={e => e.target.style.borderColor = '#DDD0B8'}
                >
                  <option value="">Select your required service</option>
                  {SERVICES.filter(s => s.name !== 'And More').map(s => (
                    <option key={s.name} value={s.name}>{s.name}</option>
                  ))}
                  <option value="Other">Other / Not sure yet</option>
                </select>
                {/* Custom chevron */}
                <div style={{
                  position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)',
                  pointerEvents: 'none',
                }}>
                  <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
                    <path d="M1 1L8 8L15 1" stroke="#6B5C45" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>

            {/* Message */}
            <div style={{ marginBottom: 32 }}>
              <label style={labelStyle}>Message <span style={{ fontWeight: 400, color: '#8A7A5A' }}>(optional)</span></label>
              <textarea
                rows={4}
                placeholder="Tell us a bit more about the job..."
                value={form.message}
                onChange={e => set('message', e.target.value)}
                style={{ ...inputStyle, resize: 'vertical', lineHeight: 1.6 }}
                onFocus={e => e.target.style.borderColor = C.goldDark}
                onBlur={e => e.target.style.borderColor = '#DDD0B8'}
              />
            </div>

            {/* Submit */}
            <button type="submit" style={{
              width: '100%',
              background: `linear-gradient(90deg, ${C.goldDark}, ${C.gold})`,
              border: 'none',
              borderRadius: 8,
              padding: '16px',
              fontFamily: fonts.sans,
              fontSize: 16,
              fontWeight: 700,
              color: C.black,
              cursor: 'pointer',
              letterSpacing: '0.02em',
              boxShadow: `0 4px 20px rgba(201,162,39,0.3)`,
              transition: 'opacity 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = '0.9'}
            onMouseLeave={e => e.currentTarget.style.opacity = '1'}
            >
              Get in Touch
            </button>

            {/* Or divider + direct contact */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 16, margin: '28px 0 24px' }}>
              <div style={{ flex: 1, height: 1, background: C.borderLight }} />
              <span style={{ fontFamily: fonts.sans, fontSize: 13, color: '#8A7A5A', fontWeight: 500 }}>or reach out directly</span>
              <div style={{ flex: 1, height: 1, background: C.borderLight }} />
            </div>

            <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              <PhoneTextBtn small />
              <a href={`mailto:${BIZ.email}`} style={{
                display: 'inline-flex', alignItems: 'center', gap: 8,
                padding: '10px 22px', borderRadius: 6,
                border: `1.5px solid ${C.borderLight}`,
                background: 'transparent',
                fontFamily: fonts.sans, fontSize: 13, fontWeight: 600,
                color: C.textMid, textDecoration: 'none', transition: 'border-color 0.15s',
              }}
              onMouseEnter={e => e.currentTarget.style.borderColor = C.goldDark}
              onMouseLeave={e => e.currentTarget.style.borderColor = C.borderLight}
              >
                {BIZ.email}
              </a>
            </div>
          </form>
        )}
      </div>
    </section>
  );
}
